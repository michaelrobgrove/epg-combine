# Cloudflare Pages configuration
name = "epg-combine"
main = "./dist/index.js"
compatibility_date = "2026-03-01"

[env.production]
name = "epg-combine"
route = "epg-combine.pages.dev/*"
compatibility_date = "2026-03-01"

[triggers]
crons = ["0 * * * *"] # Runs every hour

# Build settings
[build]
  command = "npm run build"
  publish = "dist"

# Environment variables
[env]
  ADMIN_USERNAME = "admin"
  ADMIN_PASSWORD = "password123"

# Routes
[[routes]]
  pattern = "/*"
  upstream = "epg-combine.pages.dev"

# Functions
[functions]
  node_bundler = "esbuild"

# KV Namespaces
[[kv_namespaces]]
binding = "EPG_KV"
id = "99eaae3d0dc845a19ee6bec9a6c68fc9"
